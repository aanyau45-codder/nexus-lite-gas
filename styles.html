<style>
:root {
  --card:#ffffff; --ring:#6366f1; --input:#d1d5db; --muted:#f3f4f6; --accent:#e0e7ff;
  --border:#d1d5db; --radius:0.5rem; --chart-1:#6366f1; --chart-2:#4f46e5; --chart-3:#4338ca;
  --chart-4:#3730a3; --chart-5:#312e81; --popover:#ffffff; --primary:#6366f1; --sidebar:#f3f4f6;
  --font-mono:"JetBrains Mono",monospace; --font-sans:"Inter",sans-serif; --secondary:#e5e7eb;
  --background:#f8fafc; --font-serif:"Merriweather",serif; --foreground:#1e293b; --destructive:#ef4444;
  --shadow-opacity:0.1; --sidebar-ring:#6366f1; --sidebar-accent:#e0e7ff; --sidebar-border:#d1d5db;
  --card-foreground:#1e293b; --sidebar-primary:#6366f1; --muted-foreground:#6b7280;
  --accent-foreground:#374151; --popover-foreground:#1e293b; --primary-foreground:#ffffff;
  --sidebar-foreground:#1e293b; --secondary-foreground:#374151; --destructive-foreground:#ffffff;
  --sidebar-accent-foreground:#374151; --sidebar-primary-foreground:#ffffff;
  --success:#16a34a; --warning:#d97706;
}
.dark {
  --card:#1e293b; --ring:#818cf8; --input:#4b5563; --muted:#1e293b; --accent:#374151;
  --border:#4b5563; --chart-1:#818cf8; --chart-2:#6366f1; --chart-3:#4f46e5; --chart-4:#4338ca;
  --chart-5:#3730a3; --popover:#1e293b; --primary:#818cf8; --sidebar:#1e293b; --secondary:#2d3748;
  --background:#0f172a; --foreground:#e2e8f0; --destructive:#ef4444; --sidebar-ring:#818cf8;
  --sidebar-accent:#374151; --sidebar-border:#4b5563; --card-foreground:#e2e8f0;
  --sidebar-primary:#818cf8; --muted-foreground:#9ca3af; --accent-foreground:#d1d5db;
  --popover-foreground:#e2e8f0; --primary-foreground:#0f172a; --sidebar-foreground:#e2e8f0;
  --secondary-foreground:#d1d5db; --destructive-foreground:#0f172a;
  --sidebar-accent-foreground:#d1d5db; --sidebar-primary-foreground:#0f172a;
  --success:#22c55e; --warning:#f59e0b;
}

* { box-sizing:border-box; }
html,body { height:100%; }
body { margin:0; font-family:var(--font-sans); background:var(--background); color:var(--foreground);
  -webkit-font-smoothing:antialiased; font-size:15px; }
a { color:inherit; text-decoration:none; }
h1 { font-size:1.3rem; margin:0; } h2 { font-size:1.05rem; margin:0; }
code { font-family:var(--font-mono); background:var(--muted); padding:1px 5px; border-radius:4px; font-size:.85em; }
.mono { font-family:var(--font-mono); }
.muted { color:var(--muted-foreground); }
.spacer { flex:1; }

/* boot + spinner */
.boot { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:12px; color:var(--muted-foreground); padding:24px; text-align:center; }
.spinner { width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--primary);
  border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* buttons */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; height:40px; padding:0 16px;
  border-radius:var(--radius); border:1px solid transparent; font:inherit; font-weight:500; cursor:pointer;
  background:var(--secondary); color:var(--secondary-foreground); white-space:nowrap; }
.btn:hover { filter:brightness(.97); }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn-primary { background:var(--primary); color:var(--primary-foreground); }
.btn-ghost { background:transparent; border-color:var(--border); color:var(--foreground); }
.btn-ghost:hover { background:var(--muted); }
.btn-danger { background:var(--destructive); color:var(--destructive-foreground); }
.btn-sm { height:32px; padding:0 10px; font-size:.85rem; }
.btn-block { width:100%; }
.icon-btn { background:transparent; border:none; border-radius:var(--radius); width:38px; height:38px;
  font-size:18px; cursor:pointer; color:var(--foreground); }
.icon-btn:hover { background:var(--muted); }

/* inputs */
.input,select.input,textarea.input { width:100%; height:40px; padding:0 12px; border:1px solid var(--input);
  border-radius:var(--radius); background:var(--card); color:var(--foreground); font:inherit; }
textarea.input { height:auto; padding:10px 12px; min-height:72px; }
.input:focus { outline:none; border-color:var(--ring); box-shadow:0 0 0 3px color-mix(in srgb,var(--ring) 30%,transparent); }
.label { display:block; font-size:.82rem; color:var(--muted-foreground); margin-bottom:5px; }
.field { margin-bottom:12px; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media (max-width:520px){ .grid2 { grid-template-columns:1fr; } }

/* badges + chips */
.badge { display:inline-flex; align-items:center; gap:4px; padding:2px 9px; border-radius:999px; font-size:.72rem;
  font-weight:500; background:var(--accent); color:var(--accent-foreground); }
.badge.ok { background:color-mix(in srgb,var(--success) 18%,transparent); color:var(--success); }
.badge.warn { background:color-mix(in srgb,var(--warning) 20%,transparent); color:var(--warning); }
.badge.bad { background:color-mix(in srgb,var(--destructive) 18%,transparent); color:var(--destructive); }
.chip { padding:6px 12px; border-radius:999px; border:1px solid var(--border); background:var(--card);
  color:var(--muted-foreground); cursor:pointer; font-size:.85rem; white-space:nowrap; }
.chip.active { background:var(--primary); color:var(--primary-foreground); border-color:var(--primary); }

/* cards */
.card { background:var(--card); color:var(--card-foreground); border:1px solid var(--border);
  border-radius:var(--radius); padding:16px; box-shadow:0 4px 8px -1px hsl(0 0% 0% / var(--shadow-opacity)); }
.card + .card { margin-top:14px; }
.row { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:9px 0;
  border-bottom:1px solid var(--border); }
.row:last-child { border-bottom:0; }
.stat { font-size:1.5rem; font-weight:700; }

/* tables */
.table { width:100%; border-collapse:collapse; }
.table th { text-align:left; font-size:.72rem; text-transform:uppercase; letter-spacing:.04em;
  color:var(--muted-foreground); padding:10px 10px; border-bottom:1px solid var(--border); }
.table td { padding:11px 10px; border-bottom:1px solid var(--border); }
.table tr:hover td { background:var(--muted); }

/* login */
.auth { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.auth-card { width:100%; max-width:380px; }
.auth-logo { width:48px; height:48px; border-radius:12px; background:var(--primary); color:var(--primary-foreground);
  display:grid; place-items:center; font-weight:700; font-size:22px; margin:0 auto 14px; }
.auth h1 { text-align:center; margin-bottom:4px; } .auth .sub { text-align:center; margin-bottom:18px; }
.link { color:var(--primary); cursor:pointer; font-size:.88rem; }

/* app layout */
#app.app { min-height:100vh; display:grid; grid-template-columns:1fr; }
.sidebar { display:none; }
.main { min-width:0; display:flex; flex-direction:column; min-height:100vh; }
.topbar { position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:10px; height:56px;
  padding:0 12px; background:var(--card); border-bottom:1px solid var(--border); }
.biz { font-weight:600; }
.who { font-size:.78rem; color:var(--muted-foreground); }
.view { flex:1; padding:16px; padding-bottom:90px; max-width:1120px; width:100%; margin:0 auto; }
.view-head { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.view-head .spacer { flex:1; }

/* sidebar nav */
.brand { display:flex; align-items:center; gap:10px; padding:16px; font-weight:700; }
.brand-mark { width:30px; height:30px; display:grid; place-items:center; border-radius:8px;
  background:var(--primary); color:var(--primary-foreground); }
.nav { display:flex; flex-direction:column; gap:2px; padding:8px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:var(--radius);
  color:var(--sidebar-foreground); font-weight:500; cursor:pointer; }
.nav-item:hover { background:var(--sidebar-accent); color:var(--sidebar-accent-foreground); }
.nav-item.active { background:var(--sidebar-primary); color:var(--sidebar-primary-foreground); }
.nav-ico { width:20px; text-align:center; }

/* bottom nav */
.bottom-nav { position:fixed; left:0; right:0; bottom:0; z-index:30; display:flex; background:var(--card);
  border-top:1px solid var(--border); padding-bottom:env(safe-area-inset-bottom); }
.bn-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 0;
  color:var(--muted-foreground); font-size:18px; cursor:pointer; }
.bn-item small { font-size:.62rem; }
.bn-item.active { color:var(--primary); }

.backdrop { display:none; }

@media (min-width:1024px) {
  #app.app { grid-template-columns:220px 1fr; }
  .sidebar { display:block; position:sticky; top:0; align-self:start; height:100vh;
    background:var(--sidebar); border-right:1px solid var(--sidebar-border); overflow-y:auto; }
  .bottom-nav { display:none; }
  .view { padding:24px; padding-bottom:24px; }
  .only-mobile { display:none !important; }
}
@media (max-width:1023px) {
  #app.app.nav-open .sidebar { display:block; position:fixed; top:0; left:0; bottom:0; width:250px; z-index:50;
    background:var(--sidebar); border-right:1px solid var(--sidebar-border); overflow-y:auto; }
  #app.app.nav-open .backdrop { display:block; position:fixed; inset:0; background:hsl(0 0% 0% / .45); z-index:45; }
}

/* POS */
.pos { display:grid; grid-template-columns:1fr; gap:14px; }
.pos-products { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; }
.tile { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:10px;
  cursor:pointer; text-align:left; display:flex; flex-direction:column; gap:6px; }
.tile:hover { border-color:var(--primary); }
.tile .ph { aspect-ratio:1; border-radius:8px; background:var(--muted); display:grid; place-items:center;
  font-size:24px; overflow:hidden; }
.tile .ph img { width:100%; height:100%; object-fit:cover; }
.tile .nm { font-size:.82rem; font-weight:500; line-height:1.2; }
.tile .pr { font-weight:600; font-size:.85rem; }
.cart { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:14px; }
.cart-item { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border); }
.qtybtn { width:28px; height:28px; border-radius:6px; border:1px solid var(--border); background:var(--muted);
  cursor:pointer; font-size:16px; }
.cart-cta { position:fixed; left:0; right:0; bottom:0; z-index:35; padding:10px 14px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom)); background:var(--card); border-top:1px solid var(--border); }
@media (min-width:1024px){
  .pos { grid-template-columns:1fr 360px; align-items:start; }
  .cart { position:sticky; top:72px; }
  .cart-cta { display:none; }
}

/* modal + sheet */
.modal-bg { position:fixed; inset:0; background:hsl(0 0% 0% / .5); z-index:60; display:flex;
  align-items:flex-end; justify-content:center; padding:0; }
.modal { background:var(--card); color:var(--card-foreground); width:100%; max-width:520px; max-height:92vh;
  overflow-y:auto; border-radius:16px 16px 0 0; padding:18px; }
.modal h2 { margin-bottom:12px; }
.modal-head { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
@media (min-width:640px){
  .modal-bg { align-items:center; padding:20px; }
  .modal { border-radius:var(--radius); }
}

/* toast */
.toast { position:fixed; left:50%; bottom:90px; transform:translateX(-50%) translateY(20px); z-index:100;
  background:var(--foreground); color:var(--background); padding:10px 16px; border-radius:999px; font-size:.86rem;
  opacity:0; pointer-events:none; transition:.2s; max-width:90vw; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.err { background:var(--destructive); color:#fff; }

/* misc */
.empty { text-align:center; color:var(--muted-foreground); padding:48px 16px; }
.bars { display:flex; align-items:flex-end; gap:6px; height:120px; }
.bar { flex:1; background:var(--chart-1); border-radius:6px 6px 0 0; min-height:3px; }
.bar small { display:block; text-align:center; color:var(--muted-foreground); font-size:.6rem; margin-top:4px; }
.cards-list { display:flex; flex-direction:column; gap:10px; }
.search { position:relative; }
.combo { position:relative; }
.combo-pop { position:absolute; z-index:40; top:calc(100% + 4px); left:0; right:0; background:var(--popover);
  border:1px solid var(--border); border-radius:var(--radius); box-shadow:0 8px 24px hsl(0 0% 0% / .18);
  max-height:240px; overflow:hidden; display:flex; flex-direction:column; }
.combo-opt { padding:9px 12px; cursor:pointer; } .combo-opt:hover { background:var(--muted); }
@media print {
  body * { visibility:hidden; }
  #receipt, #receipt * { visibility:visible; }
  #receipt { position:absolute; left:0; top:0; width:100%; }
}
#receipt { font-family:var(--font-mono); }
</style>
